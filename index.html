<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Repertuvarım</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
}


.song{

background:#222;
padding:20px;
margin:12px 0;
border-radius:12px;
font-size:22px;

user-select:none;

}


.add{

position:fixed;
right:25px;
bottom:25px;

width:65px;
height:65px;

border-radius:50%;

border:0;

font-size:35px;

background:#00c853;
color:white;

}



.modal{

display:none;

position:fixed;
inset:0;

background:#000c;

padding:20px;

}



.box{

background:#222;

padding:20px;

border-radius:15px;

margin-top:100px;

}


input,textarea{

width:100%;
padding:15px;

margin-bottom:15px;

font-size:18px;

}



button{

padding:15px;
border:0;
border-radius:10px;

font-size:18px;

}


.save{

width:100%;
background:#00c853;
color:white;

}



.delete{

background:#d50000;
color:white;
width:100%;
}



</style>

</head>


<body>


<h1>🎸 Repertuvarım</h1>


<div id="list"></div>


<button class="add" onclick="openAdd()">+</button>



<div class="modal" id="modal">

<div class="box">

<h2>Yeni Eser</h2>

<input id="title" placeholder="Eser adı">

<textarea id="lyrics" placeholder="Sözler"></textarea>


<button class="save" onclick="addSong()">
Kaydet
</button>

</div>

</div>



<script>


let songs=
JSON.parse(localStorage.getItem("songs")) || [];



function render(){

let list=document.getElementById("list");

list.innerHTML="";


songs.forEach((s,i)=>{


let div=document.createElement("div");

div.className="song";


div.innerHTML=s.title;



// normal tıklama

div.onclick=function(){

location.href="sarki.html?id="+i;

};



// uzun basma

let timer;


div.onmousedown=function(){

timer=setTimeout(()=>{


if(confirm(
s.title+" silinsin mi?"
)){


songs.splice(i,1);

localStorage.setItem(
"songs",
JSON.stringify(songs)
);


render();


}


},700);


};


div.onmouseup=function(){

clearTimeout(timer);

};



div.ontouchstart=function(){

timer=setTimeout(()=>{


if(confirm(
s.title+" silinsin mi?"
)){


songs.splice(i,1);

localStorage.setItem(
"songs",
JSON.stringify(songs)
);


render();


}


},700);


};


div.ontouchend=function(){

clearTimeout(timer);

};



list.appendChild(div);


});


}



function openAdd(){

document.getElementById("modal").style.display="block";

}



function addSong(){

let title=
document.getElementById("title").value;


let lyrics=
document.getElementById("lyrics").value;



songs.push({

title,
lyrics

});


localStorage.setItem(
"songs",
JSON.stringify(songs)
);


location.reload();


}



render();


</script>


</body>

</html>
