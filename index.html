<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Repertuvarım</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
background:#111;
color:white;
font-family:Arial;
}

h1{
text-align:center;
}


.card{
position:relative;
overflow:hidden;
margin:12px 0;
border-radius:12px;
}


.song{
background:#222;
padding:18px;
font-size:21px;
position:relative;
z-index:2;
transition:.3s;
}


.lyrics{

display:none;
background:#333;
padding:20px;
font-size:22px;
line-height:1.7;
white-space:pre-line;

}



.delete{

position:absolute;
right:0;
top:0;
height:100%;
width:90px;

background:#d50000;
display:flex;
align-items:center;
justify-content:center;

font-size:18px;

}


.add{

position:fixed;
bottom:25px;
right:25px;

width:65px;
height:65px;

border-radius:50%;
border:none;

font-size:35px;

background:#00c853;
color:white;

}



.modal{

display:none;

position:fixed;
inset:0;

background:#000b;

padding:20px;

}



.box{

background:#222;

padding:20px;

border-radius:15px;

margin-top:80px;

}



input,textarea{

width:100%;
padding:14px;

margin-bottom:15px;

font-size:18px;

border-radius:8px;

border:none;

}



.save{

width:100%;
padding:15px;

font-size:20px;

border:none;
border-radius:10px;

background:#00c853;

color:white;

}



.close{

width:100%;
padding:12px;

margin-top:10px;

background:#555;

color:white;

border:0;

border-radius:10px;

}



</style>

</head>


<body>


<h1>🎸 Repertuvarım</h1>


<div id="list"></div>



<button class="add" onclick="openModal()">+</button>



<div class="modal" id="modal">


<div class="box">


<h2>Yeni Eser</h2>


<input id="name" placeholder="Eser adı">


<textarea id="text" rows="8" placeholder="Sözler"></textarea>


<button class="save" onclick="saveSong()">
Kaydet
</button>


<button class="close" onclick="closeModal()">
İptal
</button>


</div>


</div>



<script>


let songs =
JSON.parse(localStorage.getItem("songs"))
||
[];



function render(){


let list=document.getElementById("list");

list.innerHTML="";


songs.forEach((s,i)=>{


let div=document.createElement("div");

div.className="card";


div.innerHTML=

`

<div class="delete"
onclick="removeSong(${i})">
Sil
</div>


<div class="song"
onclick="openLyrics(${i})">

${s.title}

</div>


<div class="lyrics"
id="lyric${i}">

${s.lyrics}

</div>


`;


list.appendChild(div);


});

}



function openLyrics(i){

let l=document.getElementById("lyric"+i);

if(l.style.display=="block")
l.style.display="none";

else
l.style.display="block";


}




function openModal(){

document.getElementById("modal").style.display="block";

}



function closeModal(){

document.getElementById("modal").style.display="none";

}



function saveSong(){


let title=document.getElementById("name").value.trim();

let lyrics=document.getElementById("text").value.trim();



if(!title){

alert("Eser adı yaz");

return;

}



songs.push({

title:title,
lyrics:lyrics

});



localStorage.setItem(
"songs",
JSON.stringify(songs)
);



document.getElementById("name").value="";
document.getElementById("text").value="";


closeModal();

render();


}




function removeSong(i){


if(confirm("Bu eseri silmek istiyor musun?")){


songs.splice(i,1);


localStorage.setItem(
"songs",
JSON.stringify(songs)
);


render();


}


}



render();


</script>


</body>
</html>
